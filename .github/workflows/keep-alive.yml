name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # 每 3 天執行一次
  workflow_dispatch: # 支援手動觸發

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth Health
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "::warning::SUPABASE_URL 或 SUPABASE_ANON_KEY 未設定，略過 Keep Alive。"
            exit 0
          fi
          
          echo "Pinging Supabase Auth health endpoint..."
          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.SUPABASE_URL }}/auth/v1/health" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          echo "HTTP Response Code: $RESPONSE_CODE"
          
          if [ "$RESPONSE_CODE" -eq 200 ] || [ "$RESPONSE_CODE" -eq 301 ] || [ "$RESPONSE_CODE" -eq 302 ]; then
            echo "✅ Successfully pinged Supabase Auth health endpoint."
          else
            echo "❌ Failed to ping Supabase Auth health endpoint (Code: $RESPONSE_CODE)."
            exit 1
          fi
