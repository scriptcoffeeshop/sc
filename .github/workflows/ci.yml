name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@main
        with:
          deno-version: v2.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify frontend cache version sync
        run: python3 scripts/sync_frontend_version.py --check

      - name: Verify dashboard event delegation guardrails
        run: python3 scripts/check_dashboard_event_delegation.py

      - name: Verify storefront event delegation guardrails
        run: python3 scripts/check_main_event_delegation.py

      - name: Install frontend dependencies
        run: |
          npm install

      - name: Install Playwright browser
        run: |
          npx playwright install --with-deps chromium

      - name: Run frontend unit tests
        run: npm run test:unit

      - name: Run E2E tests
        run: npm run e2e -- --reporter=line

      - name: Build frontend artifact
        run: FRONTEND_ASSET_VERSION="${GITHUB_SHA::12}" npm run build

      - name: Verify formatting
        run: deno fmt --check .
        working-directory: supabase/functions/coffee-api

      - name: Linting
        run: deno lint .
        working-directory: supabase/functions/coffee-api

      - name: Type Check
        run: deno check index.ts
        working-directory: supabase/functions/coffee-api

      - name: Run Tests
        run: JWT_SECRET=mock SUPABASE_URL=https://mock.supabase.co SUPABASE_SERVICE_ROLE_KEY=mock deno test --allow-all tests/
        working-directory: supabase/functions/coffee-api

  deploy_frontend:
    name: Deploy Frontend
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend artifact
        run: FRONTEND_ASSET_VERSION="${GITHUB_SHA::12}" npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy_backend:
    name: Deploy Supabase
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: test
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deploy secrets
        id: deploy_secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::Missing SUPABASE_ACCESS_TOKEN secret; skipping Supabase deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::Missing SUPABASE_DB_PASSWORD secret; skipping Supabase deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Setup Supabase CLI
        if: steps.deploy_secrets.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push database migrations
        if: steps.deploy_secrets.outputs.ready == 'true'
        run: bash scripts/supabase_db_push.sh

      - name: Deploy Edge Function
        if: steps.deploy_secrets.outputs.ready == 'true'
        run: bash scripts/supabase_deploy.sh
