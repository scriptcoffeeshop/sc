name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy:
        description: "在 main/master 手動執行時，同步跑 deploy jobs"
        required: false
        type: boolean
        default: true
      run_integration:
        description: "執行 Supabase local golden path 整合測試"
        required: false
        type: boolean
        default: false

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@main
        with:
          deno-version: v2.x

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Verify frontend cache version sync
        run: python3 scripts/sync_frontend_version.py --check

      - name: Verify dashboard event delegation guardrails
        run: python3 scripts/check_dashboard_event_delegation.py

      - name: Verify storefront event delegation guardrails
        run: python3 scripts/check_main_event_delegation.py

      - name: Install frontend dependencies
        run: |
          npm install

      - name: Install Playwright browser
        run: |
          npx playwright install --with-deps chromium

      - name: Run frontend unit tests
        run: npm run test:unit

      - name: Lint frontend source
        run: npm run lint:frontend

      - name: Typecheck frontend source
        run: npm run typecheck

      - name: Build frontend artifact
        run: FRONTEND_ASSET_VERSION="${GITHUB_SHA::12}" npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

      - name: Run E2E tests
        run: SKIP_E2E_BUILD=1 npm run e2e -- --reporter=line

      - name: Verify formatting
        run: deno fmt --check .
        working-directory: supabase/functions/coffee-api

      - name: Linting
        run: deno lint .
        working-directory: supabase/functions/coffee-api

      - name: Type Check
        run: deno check index.ts
        working-directory: supabase/functions/coffee-api

      - name: Run Tests
        run: JWT_SECRET=mock SUPABASE_URL=https://mock.supabase.co SUPABASE_SERVICE_ROLE_KEY=mock deno test --allow-all tests/
        working-directory: supabase/functions/coffee-api

  deploy_frontend:
    name: Deploy Frontend
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)) && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download frontend build artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy_backend:
    name: Deploy Supabase
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)) && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: test
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify deploy secrets
        id: deploy_secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::Missing SUPABASE_ACCESS_TOKEN secret; skipping Supabase deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::Missing SUPABASE_DB_PASSWORD secret; skipping Supabase deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Report skipped Supabase deployment
        if: steps.deploy_secrets.outputs.ready != 'true'
        run: |
          echo "::notice::Supabase deployment was skipped because required deploy secrets are missing."
          {
            echo "## Supabase deployment skipped"
            echo ""
            echo "Backend deployment did not run because one or more required secrets are missing:"
            echo ""
            echo "- SUPABASE_ACCESS_TOKEN"
            echo "- SUPABASE_DB_PASSWORD"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Supabase CLI
        if: steps.deploy_secrets.outputs.ready == 'true'
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Push database migrations
        if: steps.deploy_secrets.outputs.ready == 'true'
        run: bash scripts/supabase_db_push.sh

      - name: Deploy Edge Function
        if: steps.deploy_secrets.outputs.ready == 'true'
        run: bash scripts/supabase_deploy.sh

  integration_supabase:
    name: Supabase Integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@main
        with:
          deno-version: v2.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run Supabase golden path integration test
        run: npm run test:integration:supabase
